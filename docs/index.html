<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設計書</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-toc@1/dist/toc.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* サイドバー非表示時のスタイル */
    body.sidebar-hidden .sidebar {
      display: none !important;
    }

    body.sidebar-hidden .content {
      left: 0 !important;
      width: 100% !important;
      position: static !important;
    }

    body.sidebar-hidden .nav {
      padding-left: 0 !important;
    }

    /* トグルボタンのスタイル */
    #sidebar-toggle {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      background: #42b983;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: background 0.3s;
    }

    #sidebar-toggle:hover {
      background: #2c7a5f;
    }

    body.sidebar-hidden #sidebar-toggle {
      background: #666;
      left: 10px;
    }

    body.sidebar-hidden #sidebar-toggle:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <button id="sidebar-toggle" title="サイドバーの表示/非表示">☰</button>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'プロジェクト設計書',
      repo: 'https://github.com/ura148/docs-demo',
      loadSidebar: '_sidebar.md',
      loadNavbar: '_navbar.md',
      subMaxLevel: 3,
      auto2top: true,
      basePath: '/docs-demo/',
      homepage: 'README.md',
      notFoundPage: false,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '検索...',
        noData: '検索結果なし',
        depth: 3
      },
      toc: {
        tocMaxLevel: 3,
        target: 'h2, h3'
      },
      mermaid: {
        theme: 'default'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-toc@1/dist/toc.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>

  <script>
    // サイドバー表示/非表示の切り替え機能
    const toggleBtn = document.getElementById('sidebar-toggle');
    const sidebarHiddenKey = 'docsify-sidebar-hidden';

    // ページロード時に保存された状態を復元
    function restoreSidebarState() {
      if (localStorage.getItem(sidebarHiddenKey) === 'true') {
        document.body.classList.add('sidebar-hidden');
      }
    }

    // ボタンクリック時
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('sidebar-hidden');
      const isHidden = document.body.classList.contains('sidebar-hidden');
      localStorage.setItem(sidebarHiddenKey, isHidden);
    });

    // ページロード時に状態を復元
    document.addEventListener('DOMContentLoaded', restoreSidebarState);
    restoreSidebarState();
  </script>
</body>
</html>
